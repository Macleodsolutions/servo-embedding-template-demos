name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - name: macos
            runs_on: [self-hosted, macOS]
            binary_suffix: ""
            shell: bash
          - name: windows-x64
            runs_on: [self-hosted, windows, x64]
            binary_suffix: ".exe"
            shell: pwsh

    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - uses: actions/checkout@v4
        with:
          path: s

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ env.CARGO_TARGET_DIR }}
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install UI dependencies
        working-directory: s/ui
        run: corepack yarn install --frozen-lockfile

      - name: Build
        working-directory: s
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: servo-embedding-template-demos-${{ matrix.name }}
          path: ${{ env.CARGO_TARGET_DIR }}/release/servo-embedding-template-demos${{ matrix.binary_suffix }}

name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: MacOS ARM64
            runs_on: [self-hosted, macOS]
            binary_suffix: ""
            shell: bash
            cargo_target_dir: target
            artifact_path: s/target/release/servo-embedding-template-demos
          - name: Windows x64
            runs_on: [self-hosted, windows, x64]
            binary_suffix: ".exe"
            shell: pwsh
            cargo_target_dir: C:\t
            artifact_path: C:\t\release\servo-embedding-template-demos.exe

    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    env:
      CARGO_TARGET_DIR: ${{ matrix.cargo_target_dir }}
    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - uses: actions/checkout@v4
        with:
          path: s

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ env.CARGO_TARGET_DIR }}
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install UI dependencies
        working-directory: s/ui
        run: corepack yarn install --frozen-lockfile

      - name: Ensure Windows target dir exists
        if: runner.os == 'Windows'
        run: New-Item -ItemType Directory -Force -Path $env:CARGO_TARGET_DIR | Out-Null

      - name: Build
        working-directory: s
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: servo-embedding-template-demos-${{ matrix.name }}
          path: ${{ matrix.artifact_path }}

name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: MacOS ARM64
            runs_on: [self-hosted, macOS]
            binary_suffix: ""
            shell: bash
            cargo_target_dir: target
            artifact_path: s/target/release/servo-embedding-template-demos
          - name: Ubuntu x64
            runs_on: [self-hosted, Linux, X64]
            binary_suffix: ""
            shell: bash
            cargo_target_dir: target
            artifact_path: s/target/release/servo-embedding-template-demos
          - name: Windows x64
            runs_on: [self-hosted, windows, x64]
            binary_suffix: ".exe"
            shell: pwsh
            cargo_target_dir: C:\t
            artifact_path: C:\t\release\servo-embedding-template-demos.exe

    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    env:
      CARGO_TARGET_DIR: ${{ matrix.cargo_target_dir }}
    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - uses: actions/checkout@v4
        with:
          path: s

      - name: Install Rust toolchain on Linux
        if: runner.os == 'Linux'
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Install Rust toolchain on macOS
        if: runner.os == 'macOS'
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Install Rust toolchain on Windows
        if: runner.os == 'Windows'
        run: |
          if (-not (Get-Command rustup -ErrorAction SilentlyContinue)) {
            Invoke-WebRequest -Uri https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
            .\rustup-init.exe -y --profile minimal --default-toolchain stable
            "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            $env:PATH = "$env:USERPROFILE\.cargo\bin;$env:PATH"
          }
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify Node.js
        run: |
          node --version
          corepack --version

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          if ! command -v cc >/dev/null 2>&1 || ! pkg-config --exists fontconfig; then
            if command -v sudo >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y build-essential pkg-config libfontconfig1-dev
            else
              apt-get update
              apt-get install -y build-essential pkg-config libfontconfig1-dev
            fi
          fi
          cc --version
          pkg-config --modversion fontconfig

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ env.CARGO_TARGET_DIR }}
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install UI dependencies
        working-directory: s/ui
        run: corepack yarn install --frozen-lockfile

      - name: Ensure Windows target dir exists
        if: runner.os == 'Windows'
        run: New-Item -ItemType Directory -Force -Path $env:CARGO_TARGET_DIR | Out-Null

      - name: Build
        working-directory: s
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: servo-embedding-template-demos-${{ matrix.name }}
          path: ${{ matrix.artifact_path }}
